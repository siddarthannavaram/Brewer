<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brewer — Register</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-title">
    <h1>☕ Brewer</h1>
    <p>Create your account</p>
  </div>

  <div class="card">
    <div id="alert" style="display:none;"></div>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="John Doe">
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="john@example.com">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min 6 characters">
    </div>

    <button class="btn btn-primary" onclick="register()">Create Account</button>
  </div>

  <div class="auth-footer">
    Already have an account? <a href="/index.html">Sign in</a>
  </div>
</div>

<script>
  // if already logged in go to menu
  if (localStorage.getItem('token')) {
    window.location.href = '/menu.html';
  }

  async function register() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!name || !email || !password) {
      showAlert('All fields are required.', 'error');
      return;
    }

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.error, 'error');
        return;
      }

      showAlert('Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/index.html', 1500);

    } catch (err) {
      showAlert('Could not connect to server.', 'error');
    }
  }

  function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.className = `alert alert-${type}`;
    alert.textContent = message;
    alert.style.display = 'block';
  }

  // allow enter key to submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') register();
  });
</script>

</body>
</html>
