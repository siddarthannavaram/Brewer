server {
    listen 80;
    server_name _;

    # logs
    access_log /var/log/nginx/brewer_access.log;
    error_log  /var/log/nginx/brewer_error.log;

    # serve static frontend files
    location / {
        root /opt/brewer/app/public;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # proxy all /api requests to Node.js backend
    # Node.js runs on port 3000
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # proxy health check
    location /health {
        proxy_pass http://localhost:3000;
    }

    # proxy metrics - only allow from monitor01
    location /metrics {
        proxy_pass http://localhost:3000;
        allow 192.168.122.0/24;
        deny all;
    }
}
